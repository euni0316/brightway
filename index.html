<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>밝은길 - 밤길 안심 지도</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #0D1117; }
        #map { width: 100%; height: 100%; }
        .station-label { background-color: #161B22 !important; color: #F0F6FC !important; border: 1px solid rgba(255, 215, 0, 0.3) !important; border-radius: 8px !important; padding: 4px 8px !important; font-size: 11px !important; font-weight: bold; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script>
        // 1. 대한민국 전체가 한눈에 들어오도록 초기 줌 설정 (시작 줌: 7)
        const map = L.map('map').setView([36.2, 127.8], 7);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { attribution: 'CartoDB' }).addTo(map);

        // 전국 주요 역 정보
        const stations = [
            {name: "서울역", coords: [37.5546, 126.9706]}, {name: "대전역", coords: [36.3323, 127.4342]},
            {name: "동대구역", coords: [35.8797, 128.6285]}, {name: "부산역", coords: [35.1148, 129.0416]},
            {name: "포항역", coords: [36.0722, 129.3413]}, {name: "광주역", coords: [35.1654, 126.9092]},
            {name: "춘천역", coords: [37.8848, 127.7169]}, {name: "강릉역", coords: [37.7634, 128.8988]},
            {name: "전주역", coords: [35.8497, 127.1618]}, {name: "울산역", coords: [35.5534, 129.1324]}
        ];
        
        stations.forEach(st => {
            L.circleMarker(st.coords, { radius: 0, opacity: 0 }).addTo(map)
                .bindTooltip(st.name, { permanent: true, direction: 'top', className: 'station-label' });
        });

        // 2. 대한민국 전역을 채우기 위해 무작위 보안등 불빛 대량 생성 (3,500개)
        let lightData = [];
        
        // 주요 도심지 주변에 불빛을 아주 빽빽하게 생성
        stations.forEach(st => {
            for(let i=0; i<200; i++) {
                let rLat = st.coords[0] + (Math.random() - 0.5) * 0.2;
                let rLng = st.coords[1] + (Math.random() - 0.5) * 0.2;
                lightData.push([rLat, rLng, 0.9]);
            }
        });

        // 도심 외에 전국적인 가로등 인프라를 표현하기 위해 남한 전역에 추가로 1,500개 살포
        for(let i=0; i<1500; i++) {
            let countryLat = 34.5 + Math.random() * 3.5;
            let countryLng = 126.2 + Math.random() * 2.8;
            lightData.push([countryLat, countryLng, 0.5]);
        }

        // 3. 확대/축소에 따라 선명도가 변하는 황금빛 레이어 생성
        // 핵심 설정: maxZoom과 radius, blur 조절로 확대할수록 쪼개지고 선명해지게 만듭니다.
        const heatLayer = L.heatLayer(lightData, { 
            radius: 15,          // 멀리서 볼 때 부드러운 반경
            blur: 10,            // 번짐 효과
            maxZoom: 14,         // 🔍 이 값 덕분에 지도를 확대할수록 안개가 걷히고 선명한 원(점)들로 바뀝니다!
            minOpacity: 0.4,
            gradient: { 
                0.4: '#FFC107',  // 부드러운 보조 골드
                0.8: '#FFD700',  // 선명한 황금빛 보안등
                1.0: '#FFFFFF'   // 아주 밀집된 곳의 중심 빛
            } 
        }).addTo(map);

        // 4. 지도를 엄청나게 가까이 확대(줌 12 이상)하면 아예 개별 가로등 마커로 또렷하게 보이도록 하는 보너스 효과
        const markerGroup = L.layerGroup();
        map.on('zoomend', function() {
            const currentZoom = map.getZoom();
            if (currentZoom >= 12) {
                // 확대하면 히트맵 투명도를 낮추고 선명하게 만듦
                heatLayer.setOptions({ radius: 8, blur: 2 });
            } else {
                // 멀어지면 다시 비행기 야경처럼 은은하게 번지게 만듦
                heatLayer.setOptions({ radius: 15, blur: 10 });
            }
        });

    </script>
</body>
</html>
